<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Never Miss Again</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Never Miss Again</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#shop">Products</a>
  </nav>
</header>

<section class="hero">
  <img src="logo.png" class="logo">
  <h2>Never Miss Again</h2>
  <p>Elite scripts & configs for competitive players</p>
  <button onclick="scrollToShop()">Shop Now</button>
</section>

<section id="shop" class="shop">
  <h2>🔥 Featured Products</h2>

  <div class="products">

    <div class="card">
      <img src="logo.png">
      <h3>2K Green Release Script</h3>
      <p>Perfect timing every shot</p>
      <button onclick="payPayPal('https://paypal.me/YourName/10')">PayPal</button>
      <button onclick="payCashApp('2K Script')">CashApp</button>
    </div>

    <div class="card">
      <img src="logo.png">
      <h3>Fortnite Aim Pack</h3>
      <p>Laser accuracy + tracking boost</p>
      <button onclick="payPayPal('https://paypal.me/YourName/15')">PayPal</button>
      <button onclick="payCashApp('Fortnite Pack')">CashApp</button>
    </div>

    <div class="card">
      <img src="logo.png">
      <h3>FPS Boost Config</h3>
      <p>Max performance + no lag</p>
      <button onclick="payPayPal('https://paypal.me/YourName/5')">PayPal</button>
      <button onclick="payCashApp('FPS Config')">CashApp</button>
    </div>

  </div>
</section>

<footer>
  <p>© 2026 Never Miss Again</p>
</footer>

<script>
function scrollToShop() {
  document.getElementById("shop").scrollIntoView({ behavior: "smooth" });
}

function payPayPal(link) {
  window.open(link, "_blank");
}

function payCashApp(product) {
  window.open("https://cash.app/$RicoAmos10", "_blank");
  alert("Send payment with note: " + product);
}
</script>

</body>
</html>
